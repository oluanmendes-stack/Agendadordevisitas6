name: Swift CI - Agendador de Visitas

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Swift
        run: swift --version
      
      - name: Build
        run: swift build -v
      
      - name: Run tests
        run: swift test -v || true
      
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          swift build -c release
          zip -r AgendadorDeVisitas-${{ github.ref_name }}.zip .build/release/AgendadorDeVisitas
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: AgendadorDeVisitas-build
          path: .build/debug/AgendadorDeVisitas
