# .swiftlint.yml
# "included" é omitido aqui — o path é passado via --path na CLI do CI.
# Em desenvolvimento local, rode: swiftlint lint --path ImoveisApp

excluded:
  - ImoveisApp.xcodeproj
  - Pods
  - .build

disabled_rules:
  - trailing_comma
  - multiple_closures_with_trailing_closure

opt_in_rules:
  - empty_count
  - first_where
  - toggle_bool

line_length:
  warning: 130
  error: 160
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 60
  error: 100

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 300
  error: 500

identifier_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - id

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

reporter: "github-actions-logging"
