name: iOS CI — Visitas Imóveis

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  SCHEME: ImoveisApp
  SWIFT_DIR: ImoveisApp
  DESTINATION: "platform=iOS Simulator,name=iPhone 15 Pro,OS=17.5"
  XCODE_VERSION: "15.4"

jobs:

  # ─────────────────────────────────────────────────────────────────
  # JOB 1 — Build & Test
  # ─────────────────────────────────────────────────────────────────
  build-and-test:
    name: 🔨 Build & Test
    runs-on: macos-14

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🛠 Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: 🔍 Locate .xcodeproj and set PROJECT_PATH
        run: |
          # Busca o .xcodeproj em até 3 níveis de profundidade
          PROJ=$(find . -maxdepth 3 -name "*.xcodeproj" | head -1)
          if [ -z "$PROJ" ]; then
            echo "❌ Nenhum .xcodeproj encontrado. Estrutura do repo:"
            find . -maxdepth 4 -not -path '*/.git/*' | sort
            exit 1
          fi
          echo "✅ Projeto encontrado: $PROJ"
          # Exporta para os próximos steps via GITHUB_ENV
          echo "PROJECT_PATH=$PROJ" >> "$GITHUB_ENV"
          xcodebuild -version
          xcodebuild -project "$PROJ" -list

      - name: 📦 Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme  "${{ env.SCHEME }}"

      - name: 🔨 Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project     "$PROJECT_PATH" \
            -scheme      "${{ env.SCHEME }}" \
            -destination "${{ env.DESTINATION }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: 🧪 Run Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project     "$PROJECT_PATH" \
            -scheme      "${{ env.SCHEME }}" \
            -destination "${{ env.DESTINATION }}" \
            -configuration Debug \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: TestResults.xcresult
          if-no-files-found: warn
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────
  # JOB 2 — SwiftLint
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 SwiftLint
    runs-on: macos-14

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔍 Run SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint \
            --path "${{ env.SWIFT_DIR }}" \
            --reporter github-actions-logging \
            --strict

  # ─────────────────────────────────────────────────────────────────
  # JOB 3 — Archive & Export IPA (apenas na main)
  # ─────────────────────────────────────────────────────────────────
  archive:
    name: 📦 Archive & Export IPA
    runs-on: macos-14
    needs: [build-and-test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🛠 Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: 🔍 Locate .xcodeproj
        run: |
          PROJ=$(find . -maxdepth 3 -name "*.xcodeproj" | head -1)
          echo "PROJECT_PATH=$PROJ" >> "$GITHUB_ENV"

      - name: 🔐 Import Code Signing Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/cert.p12
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $RUNNER_TEMP/profile.mobileprovision

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 \
            -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: 🗃 Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project     "$PROJECT_PATH" \
            -scheme      "${{ env.SCHEME }}" \
            -archivePath "$RUNNER_TEMP/ImoveisApp.xcarchive" \
            -configuration Release \
            | xcpretty --color

      - name: 📤 Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath        "$RUNNER_TEMP/ImoveisApp.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath         "$RUNNER_TEMP/ipa" \
            | xcpretty --color

      - name: 📦 Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImoveisApp-${{ github.run_number }}.ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30

      - name: 🧹 Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain || true

  # ─────────────────────────────────────────────────────────────────
  # JOB 4 — Notificação de Status
  # ─────────────────────────────────────────────────────────────────
  notify:
    name: 📣 Notify
    runs-on: ubuntu-latest
    needs: [archive]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: 📣 Slack notification
        uses: 8398a7/action-slack@v3
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
